<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0062e3" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" />
  <title>Quickest · London</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <section class="panel">
    <div id="tabs" class="tabs hidden" role="tablist">
      <button class="tab active" data-sort="fastest" role="tab">
        <span class="tab-k">Fastest</span>
        <span class="tab-v" id="tabFastest"></span>
      </button>
      <button class="tab" data-sort="cheapest" role="tab">
        <span class="tab-k">Cheapest</span>
        <span class="tab-v" id="tabCheapest"></span>
      </button>
    </div>
    <section id="results" class="results" aria-live="polite"></section>
  </section>

  <header class="bar">
    <div class="inputs">
      <div class="field">
        <span class="dot from"></span>
        <input id="from" placeholder="From — address, postcode, station" autocomplete="off" />
        <button id="locBtn" class="ghost" title="Use my location">◎</button>
      </div>
      <div class="field">
        <span class="dot to"></span>
        <input id="to" placeholder="To — where in London?" autocomplete="off" />
      </div>
      <div class="row">
        <label class="toggle">
          <input type="checkbox" id="return" />
          <span class="track"></span>
          <span class="lbl">↔ Return journey</span>
        </label>
        <button id="go" class="go">Find route</button>
      </div>
    </div>
  </header>

  <div id="status" class="status hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
