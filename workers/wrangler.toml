# Cloudflare Worker config for the BR Fares proxy. See docs/TRAIN_FARES.md.
#
#   cd workers
#   npx wrangler login
#   npx wrangler secret put BRFARES_KEY    # paste your BR Fares API key
#   npx wrangler deploy
#
# Deploy prints a URL like https://brfares-proxy.<you>.workers.dev — put that in
# the app:  localStorage.setItem("quickest.faresEndpoint", "<that URL>")

name = "brfares-proxy"
main = "brfares-proxy.js"
compatibility_date = "2024-11-01"

# BRFARES_KEY is set as an encrypted secret, not here:
#   npx wrangler secret put BRFARES_KEY
